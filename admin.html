<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaunchPad Media | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="section">
    <div class="container">
      <div id="login" class="card" style="max-width:420px;margin:20px auto;">
        <h2>Admin Login</h2>
        <p style="margin:10px 0 14px;">Internal moderation panel for reviews and contact messages.</p>
        <div class="field">
          <label for="pw">Password</label>
          <input id="pw" type="password" />
        </div>
        <button class="btn primary" id="login-btn">Log In</button>
        <p id="login-msg" style="margin-top:8px;"></p>
      </div>

      <div id="panel" style="display:none;">
        <h1 style="margin-bottom:14px;">Admin Panel</h1>
        <div class="grid two">
          <section class="card">
            <h3>Pending Reviews</h3>
            <div id="pending-reviews" style="margin-top:10px;"></div>
          </section>
          <section class="card">
            <h3>Inbox Messages</h3>
            <div id="inbox-messages" style="margin-top:10px;"></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script>
    const ADMIN_PASSWORD = "launchpad2026";
    const REVIEWS_KEY = "lpm_reviews";
    const MESSAGES_KEY = "lpm_messages";

    const loginWrap = document.getElementById("login");
    const panel = document.getElementById("panel");
    const loginMsg = document.getElementById("login-msg");

    function getReviews() { try { return JSON.parse(localStorage.getItem(REVIEWS_KEY)) || []; } catch { return []; } }
    function saveReviews(v) { localStorage.setItem(REVIEWS_KEY, JSON.stringify(v)); }
    function getMessages() { try { return JSON.parse(localStorage.getItem(MESSAGES_KEY)) || []; } catch { return []; } }
    function saveMessages(v) { localStorage.setItem(MESSAGES_KEY, JSON.stringify(v)); }

    function render() {
      const pending = getReviews().filter((r) => r.status !== "approved");
      const messages = getMessages().sort((a, b) => new Date(b.submitted) - new Date(a.submitted));

      const pendingEl = document.getElementById("pending-reviews");
      const msgEl = document.getElementById("inbox-messages");

      pendingEl.innerHTML = pending.length ? pending.map((r) => `
        <div style="border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;">
          <p><strong>${r.name || "Anonymous"}</strong> (${r.stars || 0}/5)</p>
          <p>${r.body || ""}</p>
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button class="btn primary" onclick="approve(${r.id})">Approve</button>
            <button class="btn ghost" onclick="removeReview(${r.id})">Delete</button>
          </div>
        </div>
      `).join("") : "<p>No pending reviews.</p>";

      msgEl.innerHTML = messages.length ? messages.map((m) => `
        <div style="border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:8px;">
          <p><strong>${m.name || "Unknown"}</strong> - ${m.email || "No email"}</p>
          <p>${m.msg || ""}</p>
          <p style="font-size:.8rem;">${m.submitted ? new Date(m.submitted).toLocaleString() : ""}</p>
          <button class="btn ghost" onclick="removeMessage(${m.id})">Delete</button>
        </div>
      `).join("") : "<p>No messages yet.</p>";
    }

    function approve(id) {
      const all = getReviews().map((r) => r.id === id ? { ...r, status: "approved" } : r);
      saveReviews(all);
      render();
    }

    function removeReview(id) {
      saveReviews(getReviews().filter((r) => r.id !== id));
      render();
    }

    function removeMessage(id) {
      saveMessages(getMessages().filter((m) => m.id !== id));
      render();
    }

    document.getElementById("login-btn").addEventListener("click", () => {
      const val = document.getElementById("pw").value;
      if (val !== ADMIN_PASSWORD) {
        loginMsg.textContent = "Incorrect password.";
        return;
      }
      sessionStorage.setItem("lpm_admin", "1");
      loginWrap.style.display = "none";
      panel.style.display = "block";
      render();
    });

    if (sessionStorage.getItem("lpm_admin") === "1") {
      loginWrap.style.display = "none";
      panel.style.display = "block";
      render();
    }
  </script>
</body>
</html>
