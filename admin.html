<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LaunchPad Media | Review Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #34c3ff; --violet: #7c5cff; --pink: #ff4fd8;
      --bg: #07080f; --bg2: #0d0f1c;
      --border: rgba(255,255,255,0.08); --text: #e8e9f2; --muted: rgba(232,233,242,0.5);
      --green: #4ade80; --red: #f87171;
      --grad: linear-gradient(135deg, var(--blue), var(--violet), var(--pink));
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* LOGIN SCREEN */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
      padding: 48px; width: 380px; text-align: center;
    }
    .login-box h1 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .login-box p { font-size: .88rem; color: var(--muted); margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 13px 16px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .95rem;
      outline: none; margin-bottom: 14px; transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--violet); }
    .btn-grad {
      width: 100%; padding: 13px; border-radius: 100px; border: none;
      background: var(--grad); color: #fff; font-weight: 600; font-size: .95rem;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-grad:hover { opacity: .88; }
    .login-err { font-size: .82rem; color: var(--red); margin-top: 10px; min-height: 18px; }

    /* ADMIN PANEL */
    #admin-panel { display: none; padding: 48px; max-width: 1000px; margin: 0 auto; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 16px; }
    .admin-header h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; }
    .badge-count { padding: 4px 14px; border-radius: 100px; background: rgba(124,92,255,0.15); border: 1px solid rgba(124,92,255,0.3); color: var(--violet); font-size: .82rem; font-weight: 600; }
    .btn-logout { padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: .82rem; cursor: pointer; transition: border-color .2s; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .tabs { display: flex; gap: 4px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .tab { padding: 10px 22px; font-size: .88rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .2s, border-color .2s; }
    .tab.active { color: var(--text); border-bottom-color: var(--violet); }

    .review-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px 28px; margin-bottom: 16px;
      display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start;
    }
    .rc-stars { color: #fbbf24; font-size: .95rem; margin-bottom: 6px; }
    .rc-body { font-size: .92rem; color: var(--text); line-height: 1.6; margin-bottom: 10px; font-style: italic; }
    .rc-meta { font-size: .8rem; color: var(--muted); }
    .rc-meta strong { color: var(--text); }
    .rc-date { font-size: .75rem; color: var(--muted); margin-top: 4px; }
    .rc-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .btn-approve {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: rgba(74,222,128,0.12); color: var(--green);
      font-size: .82rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .2s;
    }
    .btn-approve:hover { background: rgba(74,222,128,0.22); }
    .btn-reject {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: rgba(248,113,113,0.10); color: var(--red);
      font-size: .82rem; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background .2s;
    }
    .btn-reject:hover { background: rgba(248,113,113,0.2); }
    .btn-delete {
      padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
      background: none; color: var(--muted);
      font-size: .82rem; cursor: pointer; white-space: nowrap;
      transition: border-color .2s, color .2s;
    }
    .btn-delete:hover { border-color: var(--red); color: var(--red); }

    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 100px; font-size: .72rem; font-weight: 600; }
    .status-pending { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .status-approved { background: rgba(74,222,128,0.12); color: var(--green); }

    .empty-state { text-align: center; padding: 60px; color: var(--muted); font-size: .95rem; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Admin Login</h1>
    <p>LaunchPad Media 脗路 Review Portal</p>
    <input type="password" id="pw-input" placeholder="Enter admin password" />
    <button class="btn-grad" id="login-btn">Log In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <h1>Review Manager</h1>
      <span class="badge-count" id="pending-count">0 pending</span>
    </div>
    <button class="btn-logout" id="logout-btn">Log out</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="pending">Pending</div>
    <div class="tab" data-tab="approved">Approved</div>
  </div>

  <div id="tab-pending"></div>
  <div id="tab-approved" style="display:none;"></div>
</div>

<script>
  // 芒聰聙芒聰聙 CONFIG 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  // Change this password to whatever you want
  const ADMIN_PASSWORD = 'launchpad2026';
  const STORAGE_KEY = 'lpm_reviews';

  // 芒聰聙芒聰聙 HELPERS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function getReviews() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveReviews(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function stars(n) { return '芒聵聟'.repeat(n) + '芒聵聠'.repeat(5 - n); }

  // 芒聰聙芒聰聙 RENDER 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function renderPanel() {
    const reviews = getReviews();
    const pending  = reviews.filter(r => r.status === 'pending');
    const approved = reviews.filter(r => r.status === 'approved');

    document.getElementById('pending-count').textContent = pending.length + ' pending';

    renderList('tab-pending', pending, ['approve', 'reject']);
    renderList('tab-approved', approved, ['reject', 'delete']);
  }

  function renderList(containerId, list, actions) {
    const el = document.getElementById(containerId);
    if (list.length === 0) {
      el.innerHTML = '<div class="empty-state">No reviews here.</div>';
      return;
    }
    el.innerHTML = list.map(r => `
      <div class="review-card" id="card-${r.id}">
        <div>
          <div class="rc-stars">${stars(r.stars)}</div>
          <div class="rc-body">"${r.body}"</div>
          <div class="rc-meta">
            <strong>${r.name}</strong>${r.biz ? ' 脗路 ' + r.biz : ''}
            <span class="status-pill status-${r.status}" style="margin-left:8px;">${r.status}</span>
          </div>
          <div class="rc-date">Submitted ${formatDate(r.submitted)}</div>
        </div>
        <div class="rc-actions">
          ${actions.includes('approve') ? `<button class="btn-approve" onclick="approveReview(${r.id})">芒聹聯 Approve</button>` : ''}
          ${actions.includes('reject')  ? `<button class="btn-reject"  onclick="rejectReview(${r.id})">芒聹聲 Reject</button>` : ''}
          ${actions.includes('delete')  ? `<button class="btn-delete"  onclick="deleteReview(${r.id})">Delete</button>` : ''}
        </div>
      </div>`).join('');
  }

  function approveReview(id) {
    const reviews = getReviews().map(r => r.id === id ? {...r, status: 'approved'} : r);
    saveReviews(reviews); renderPanel();
  }
  function rejectReview(id) {
    if (!confirm('Reject this review? It will be removed.')) return;
    const reviews = getReviews().filter(r => r.id !== id);
    saveReviews(reviews); renderPanel();
  }
  function deleteReview(id) {
    if (!confirm('Permanently delete this approved review?')) return;
    const reviews = getReviews().filter(r => r.id !== id);
    saveReviews(reviews); renderPanel();
  }

  // 芒聰聙芒聰聙 TABS 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-pending').style.display  = tab.dataset.tab === 'pending'  ? 'block' : 'none';
      document.getElementById('tab-approved').style.display = tab.dataset.tab === 'approved' ? 'block' : 'none';
    });
  });

  // 芒聰聙芒聰聙 AUTH 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderPanel();
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('lpm_admin', '1');
      showPanel();
    } else {
      document.getElementById('login-err').textContent = 'Incorrect password. Try again.';
    }
  });

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('lpm_admin');
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
  });

  // Auto-login if already authenticated this session
  if (sessionStorage.getItem('lpm_admin') === '1') showPanel();
</script>
</body>
</html>
