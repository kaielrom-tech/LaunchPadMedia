<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaunchPad Media | About</title>

  <style>
    :root{
      --bg:#0b0d12;
      --panel:#121622;
      --panel2:#0f1320;
      --border:#232a3b;
      --text:#e9ecf5;
      --muted:#aeb6cc;
      --brand:#4f8cff;
      --brand2:#7c5cff;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    body{
      background: radial-gradient(1200px 600px at 20% -10%, rgba(79,140,255,.22), transparent 55%),
                  radial-gradient(1000px 500px at 90% 10%, rgba(124,92,255,.18), transparent 50%),
                  var(--bg);
      color:var(--text); line-height:1.6;
    }
    a{color:inherit;text-decoration:none;}
    .container{width:min(1120px,92%);margin:0 auto;}
    .nav{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: rgba(11,13,18,.65);
      border-bottom:1px solid rgba(35,42,59,.8);
    }
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:18px;}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px}

    .brand-logo{
      width:36px;height:36px;display:block;flex-shrink:0;
    }

    .brand-logo svg{
      width:100%;
      height:100%;
      display:block;
    }

    .nav-links{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
    .nav-links a{color:var(--muted);padding:8px 10px;border-radius:10px;transition:.2s}
    .nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .nav-links a.active{color:var(--text);background:rgba(79,140,255,.12);border:1px solid rgba(79,140,255,.25)}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:12px 16px;border-radius:12px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:white;font-weight:700;border:0;
      box-shadow: 0 10px 25px rgba(79,140,255,.2);
      transition: transform .15s ease, filter .15s ease;
    }

    .btn:hover{transform: translateY(-1px);filter:brightness(1.05)}

    .btn.secondary{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      box-shadow:none;
    }

    .btn.secondary:hover{background:rgba(255,255,255,.08)}

    .section{padding:70px 0}

    .kicker{
      color:rgba(79,140,255,.95);
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:.8rem
    }

    .h1{font-size: clamp(2.2rem, 4vw, 3.25rem);line-height:1.1;margin:12px 0 12px}
    .h2{font-size: clamp(1.7rem, 2.6vw, 2.2rem);line-height:1.15;margin:10px 0 14px}
    .lead{color:var(--muted);font-size:1.05rem;max-width:70ch}

    .grid{display:grid;gap:18px}
    .grid.two{grid-template-columns: repeat(2, minmax(0, 1fr));}
    .grid.three{grid-template-columns: repeat(3, minmax(0, 1fr));}

    @media (max-width: 900px){
      .grid.two,.grid.three{grid-template-columns:1fr;}
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(35,42,59,.9);
      border-radius:18px;
      padding:22px;
      box-shadow: var(--shadow);
    }

    .card.soft{box-shadow:none;background:rgba(255,255,255,.03)}

    .hr{height:1px;background:rgba(35,42,59,.8);margin:18px 0}

    .small{font-size:.92rem;color:var(--muted)}

    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:999px;font-weight:800;font-size:.85rem;
      background: rgba(79,140,255,.12);
      border: 1px solid rgba(79,140,255,.25);
      color:#dfe9ff;
    }

    .badge.purple{
      background: rgba(124,92,255,.12);
      border-color: rgba(124,92,255,.25);
      color:#efe7ff;
    }

    .badge.green{
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.22);
      color:#d7ffe6;
    }

    .hero{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:18px;
      align-items:stretch;
      margin-top: 16px;
    }

    @media (max-width: 900px){
      .hero{grid-template-columns:1fr;}
    }

    .photo{
      border-radius:22px;
      border:1px solid rgba(35,42,59,.9);
      background:
      radial-gradient(480px 220px at 25% 25%, rgba(79,140,255,.18), transparent 60%),
      radial-gradient(460px 220px at 80% 65%, rgba(124,92,255,.16), transparent 55%),
      rgba(255,255,255,.03);

      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      min-height: 330px;
    }

    .photo svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .footer{
      padding:24px 0;
      border-top:1px solid rgba(35,42,59,.8);
      color: #8f97ad;
    }

    .footer-inner{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap
    }
  </style>
</head>

<body>

<div class="container nav-inner">

<nav class="nav-links">

<a href="index.html">Home</a>
<a href="services.html">Services</a>

<a class="active" href="about.html">About</a>

</nav>

</div>
</header>

<footer class="footer">
<div class="container footer-inner">
<div>© 2026 LaunchPad Media</div>

</div>

</body>
</html>
